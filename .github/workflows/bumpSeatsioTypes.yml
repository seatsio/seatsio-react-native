name: Bump @seatsio/seatsio-types version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version for @seatsio/seatsio-types'
        required: true
        type: string

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate version format
        run: |
          if ! [[ "${{ github.event.inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.].+)?$ ]]; then
            echo "::error::Invalid version '${{ github.event.inputs.version }}'. Expected something like 6.16.0"
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Update package.json
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          PKG="@seatsio/seatsio-types"
          jq --arg pkg "$PKG" --arg v "$VERSION" '.devDependencies[$pkg] = $v' \
            package.json > package.json.tmp && mv package.json.tmp package.json

          echo "Updated $PKG to $VERSION:"
          grep "$PKG" package.json

      - name: Update yarn.lock
        run: |
          corepack enable || true
          yarn install --mode update-lockfile || yarn install

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: bump @seatsio/seatsio-types to ${{ github.event.inputs.version }}"
          title: "Bump @seatsio/seatsio-types to ${{ github.event.inputs.version }}"
          body: |
            Updates `@seatsio/seatsio-types` to `${{ github.event.inputs.version }}` and refreshes `yarn.lock`.
          branch: "bump/seatsio-types-${{ github.event.inputs.version }}"
          base: main
          add-paths: |
            package.json
            yarn.lock